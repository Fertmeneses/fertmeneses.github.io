<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Set the theme before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" type="text/css" href="{{ '/assets/css/style.css' | relative_url }}">

    {% seo %}
    {% include head-custom.html %}
  </head>

  <body>
    <a id="top"></a>

    <!-- FLOATING TOP MENU -->
    <header id="site-nav" class="site-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="#top">
          <img src="{{ '/assets/website_icon_FM.jpg' | relative_url }}" alt="" class="nav-logo">
          <span>{{ site.title | default: site.github.repository_name }}</span>
        </a>

        <button id="nav-toggle" class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>

        <nav id="nav-links" class="nav-links" aria-label="Primary">
          <a href="#core-competencies">Competencies</a>
          <a href="#cv-and-links">Links</a>
          <a href="#career-trajectory">Career</a>
          <a href="#ai-projects-and-challenges">AI Projects</a>
          <a href="#media-releases">Media</a>
          <a href="#scientific-publications">Publications</a>
          <a href="#image-gallery">Gallery</a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </nav>
      </div>
    </header>

    <!-- MAIN CONTENT (rendered from README.md) -->
    <main id="main-content" class="content">
      {{ content }}
    </main>

    <!-- BOTTOM BANNER -->
    <footer class="site-footer">
      <p class="credit">Designed by Fernando Meneses, assisted by Claude Code.</p>
      <p class="published">Published with <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></p>
    </footer>

    <!-- Behavior: menu toggle, theme toggle, smooth scroll, scroll-reveal -->
    <script>
      (function () {
        var doc = document.documentElement;

        // --- Dark mode toggle ---
        var themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
          themeToggle.addEventListener('click', function () {
            var next = doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            doc.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
          });
        }

        // --- Mobile menu toggle ---
        var navToggle = document.getElementById('nav-toggle');
        var navLinks = document.getElementById('nav-links');
        function closeMenu() {
          if (!navLinks) return;
          navLinks.classList.remove('open');
          navToggle.setAttribute('aria-expanded', 'false');
        }
        if (navToggle && navLinks) {
          navToggle.addEventListener('click', function () {
            var open = navLinks.classList.toggle('open');
            navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          });
          // Close the menu after picking a destination (mobile)
          navLinks.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('click', closeMenu);
          });
        }

        // --- Shadow on nav once the page is scrolled ---
        var nav = document.getElementById('site-nav');
        function onScroll() {
          if (!nav) return;
          nav.classList.toggle('scrolled', window.scrollY > 8);
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();

        // --- Scroll-reveal (respects prefers-reduced-motion) ---
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var revealables = document.querySelectorAll('.content h1, .content h2, .content .reveal');
        if (reduce || !('IntersectionObserver' in window)) {
          revealables.forEach(function (el) { el.classList.add('is-visible'); });
        } else {
          var io = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                io.unobserve(entry.target);
              }
            });
          }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });
          revealables.forEach(function (el) { el.classList.add('reveal-init'); io.observe(el); });
        }

        // --- Publication tiles: tap-to-expand on touch devices ---
        document.querySelectorAll('.pub-tile').forEach(function (tile) {
          tile.addEventListener('click', function (e) {
            // First tap on touch reveals the title; second tap follows the link
            if (window.matchMedia('(hover: none)').matches && !tile.classList.contains('expanded')) {
              e.preventDefault();
              document.querySelectorAll('.pub-tile.expanded').forEach(function (t) { t.classList.remove('expanded'); });
              tile.classList.add('expanded');
            }
          });
        });
      })();
    </script>
  </body>
</html>
